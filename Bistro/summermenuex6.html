<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Black Goose Bistro Summer Menu</title>
  <link href="http://fonts.googleapis.com/css?family=Marko+One" rel="stylesheet">
  <style>
    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 100%;
      line-height: 1.75em;
      margin: 0 15% 0;
      background-color: #f2f2f2; /* light gray background */
      background-image: url(images/bullseye.png), url(images/blackgoose.png); /* swirl + goose */
      background-repeat: repeat, no-repeat; /* swirl tiles, goose shows once */
      background-position: center top, center 100px; /* swirl at top, goose centered lower */
      background-attachment: fixed; /* keeps background fixed while text scrolls */
    }

    header {
      margin-top: 0;
      padding: 3em 1em 2em 1em;
      text-align: center;
      background-color: rgba(255, 255, 255, .5);
      background-image: url(images/purpledot.png); /* purple dot background */
      background-repeat: repeat-x; /* repeat horizontally */
      background-position: center top;
    }

    a { text-decoration: none; }
    a:link { color: #939; }
    a:visited { color: #937393; }
    a:focus, a:hover { color: #c700f2; background-color: #fff; }
    a:active { color: #f0f; background-color: #fff; }

    h1 {
      font: bold 1.5em "Marko One", "Times New Roman", Times, serif;
      text-shadow: .05em .05em .1em lightslategray;
      color: #003366; /* dark blue */
    }

    h2 {
      font-size: 1em;
      text-transform: uppercase;
      letter-spacing: .5em;
      text-align: center;
      color: #003366; /* dark blue */
    }

    dt { font-weight: bold; color: sienna; }
    strong { font-style: italic; }
    dt strong { color: tomato; }

    ul { list-style-type: none; margin: 0; padding: 0; }

    #info p { font-style: italic; color: gray; }

    .price {
      font-family: "Times New Roman", Times, serif;
      font-style: italic;
      color: gray;
    }

    p.warning, sup { font-size: small; color: red; }

    .label { font-weight: bold; font-variant: small-caps; font-style: normal; }

    h2 + p { text-align: center; font-style: italic; }
  </style>
</head>

<body>

<header>
  <h1>Black Goose Bistro &bull; Summer Menu</h1>
  <div id="info">
    <p>Baker's Corner
